<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f4;
      font-family: 'Poppins', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      width: 280px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .info { padding: 20px; }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      color: #e05c5c;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 10px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .price { font-size: 1.2rem; font-weight: 700; color: #111; }
    .old-price { font-size: 0.85rem; color: #bbb; text-decoration: line-through; }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400" alt="MacBook">
    <div class="info">
      <div class="tag">Student Pick</div>
      <div class="product-name">MacBook Air M2</div>
      <div class="price-row">
        <span class="price">₹89,990</span>
        <span class="old-price">₹1,14,900</span>
      </div>
      <button class="btn">Add to Cart</button>
    </div>
  </div>
</body>
</html>
