<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      font-family: 'Raleway', sans-serif;
      padding: 50px 30px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      color: #fff;
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .sub {
      color: #555;
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 10px;
    }

    .gallery-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .gallery-item img:hover { transform: scale(1.07); }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>My Gallery</h1>
    <p class="sub">Aditya Chavan — B.Tech</p>
  </div>
  <div class="gallery">
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac1/400/300" alt="Photo 1"></div>
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac2/400/300" alt="Photo 2"></div>
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac3/400/300" alt="Photo 3"></div>
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac4/400/300" alt="Photo 4"></div>
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac5/400/300" alt="Photo 5"></div>
    <div class="gallery-item"><img src="https://picsum.photos/seed/ac6/400/300" alt="Photo 6"></div>
  </div>
</body>
</html>
