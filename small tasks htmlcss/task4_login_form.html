<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f, #0d1b2a);
      font-family: 'Nunito', sans-serif;
    }

    .box {
      background: #fff;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .brand {
      font-size: 1rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .brand span { color: #f4a623; }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.92rem;
      font-family: 'Nunito', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus { border-color: #1e3a5f; }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #1e3a5f;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 14px;
    }

    .login-btn:hover { background: #163050; }

    .forgot {
      display: block;
      text-align: center;
      font-size: 0.83rem;
      color: #1e3a5f;
      text-decoration: none;
    }

    .forgot:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">Aditya<span>.</span>dev</div>
    <h2>Welcome Back</h2>
    <p class="sub">Login to your account</p>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="aditya@example.com">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••">

    <button class="login-btn">Login</button>
    <a class="forgot" href="#">Forgot password?</a>
  </div>
</body>
</html>
