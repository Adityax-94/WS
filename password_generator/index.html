<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Generator</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container py-4 py-md-5">
    <div class="generator-card mx-auto">
      <h1 class="mb-4">Password Generator</h1>

      <div class="mb-3">
        <label for="passwordLength" class="form-label">Password Length:</label>
        <input
          type="number"
          class="form-control"
          id="passwordLength"
          min="6"
          max="64"
          value="17"
        />
      </div>

      <div class="mb-3 d-grid gap-2">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="includeNumbers" checked />
          <label class="form-check-label" for="includeNumbers">Include Numbers</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="includeUppercase" checked />
          <label class="form-check-label" for="includeUppercase">Include Uppercase</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="includeSpecial" checked />
          <label class="form-check-label" for="includeSpecial">Include Special Characters</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="excludeAmbiguous" checked />
          <label class="form-check-label" for="excludeAmbiguous">
            Exclude ambiguous characters (e.g. l, 1, I, O, 0)
          </label>
        </div>
      </div>

      <button id="generateBtn" class="btn btn-primary mb-4">Generate Password</button>

      <div class="mb-2">
        <label for="generatedPassword" class="form-label">Generated Password:</label>
        <input
          type="text"
          class="form-control"
          id="generatedPassword"
          readonly
          aria-live="polite"
        />
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="showPassword" checked />
        <label class="form-check-label" for="showPassword">Show Password</label>
      </div>

      <div class="progress mb-2" role="progressbar" aria-label="Password strength">
        <div id="strengthBar" class="progress-bar" style="width: 0%"></div>
      </div>
      <p id="strengthText" class="strength-text mb-4">Strength:</p>

      <button id="copyBtn" class="btn btn-outline-secondary">Copy</button>
      <p id="copyMsg" class="copy-msg mt-2" aria-live="polite"></p>
    </div>
  </main>


</body>
</html>
