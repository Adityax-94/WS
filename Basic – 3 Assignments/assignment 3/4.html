<!DOCTYPE html>
<html>

<head>
    <title>Discover The World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background-color: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .box {
            width: 950px;
            background: white;
            border-radius: 20px;
            padding: 50px 60px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .left {
            width: 50%;
        }

        .left h1 {
            font-size: 50px;
            line-height: 1.1;
            margin-bottom: 15px;
        }

        .left h1 span {
            font-style: italic;
            color: #1a5276;
        }

        .left p {
            font-size: 14px;
            color: #777;
            line-height: 1.6;
            margin-bottom: 25px;
            max-width: 320px;
        }

        .btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn1 {
            padding: 12px 28px;
            background-color: #1a5276;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn2 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            border: none;
            background: none;
        }

        .circle {
            width: 40px;
            height: 40px;
            background-color: #1a5276;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
        }

        .pic {
            width: 350px;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
        }

        .pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bottom {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        .card {
            background-color: #2e86c1;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .card .big {
            font-size: 20px;
            font-weight: bold;
        }

        .card .small {
            font-size: 12px;
            margin-top: 4px;
            color: #bee6ff;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="left">
            <h1><span>Discover</span><br>The World</h1>
            <p>Let's embark on a global journey, immersing ourselves in diverse cultures and creating unforgettable
                memories as we travel the world!</p>
            <div class="btns">
                <button class="btn1">Explore More</button>
                <button class="btn2">
                    <span class="circle">▶</span>
                    Watch Demo
                </button>
            </div>
        </div>
        <div class="right">
            <div class="pic">
                <img src="https://images.unsplash.com/photo-1503220317375-aaad61436b1b?w=500" alt="Traveler">
            </div>
        </div>
        <div class="bottom">
            <div class="card">
                <span class="big">64+ →</span>
                <div class="small">Countries</div>
            </div>
            <div class="card">
                <span class="big">24M+ →</span>
                <div class="small">Per Year User</div>
            </div>
            <div class="card">
                <span class="big">03k+ →</span>
                <div class="small">Experiences</div>
            </div>
        </div>
    </div>
</body>

</html>
