<!DOCTYPE html>
<html>

<head>
    <title>Fashion Collection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4a8, #f8c0a8, #f8c0c0);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .box {
            width: 900px;
            height: 500px;
            background-color: #f5f0eb;
            border-radius: 20px;
            position: relative;
            overflow: visible;
            display: flex;
        }

        .left {
            width: 50%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name {
            font-size: 28px;
            font-weight: bold;
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .icon {
            font-size: 24px;
            position: absolute;
            top: 30px;
            right: 30px;
            cursor: pointer;
        }

        .left h1 {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px 30px;
            background-color: #f0a050;
            color: white;
            border: 2px solid #e08830;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            width: fit-content;
            box-shadow: #d4a050;
        }

        .right {
            width: 50%;
            position: relative;
        }

        .circle {
            position: absolute;
            width: 300px;
            height: 350px;
            background-color: #f07080;
            border-radius: 50%;
            right: 20px;
            top: 80px;
            opacity: 0.6;
        }

        .pic {
            position: absolute;
            right: -30px;
            bottom: 0;
            height: 520px;
            object-fit: contain;
            border-radius: 15%;
            width: 300;
        }
    </style>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <script type="module" src="script.js"></script>
    <div class="box">
        <span class="name"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plane-icon lucide-plane"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg></span>
        <span class="icon">☰</span>
        <div class="left">
            <h1>It's time to stand out from the crowd.</h1>
            <button class="btn btn-dark" onclick="newpage()" id="abc">New Collection</button>
            

        </div>
        <div class="right">
            <div class="circle"></div>

            <img class="pic"
                src="https://img.freepik.com/free-photo/fashion-girl-posing-studio-wearing-smart-casual-sportive-outfit-business-style-sweet-pastel-colors-sunglasses-backpack-denim-jacket-mint-background-stylish-woman_291049-1800.jpg"
                alt="Fashion Model">
        </div>
    </div>
</body>

</html>
